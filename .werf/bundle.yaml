---
image: docs-generator
from: {{ index $.Images "builder/golang-alt" }}
final: false

git:
  - add: /
    to: /
    includePaths:
      - CHANGELOG
      - hack/generate_release_notes
    stageDependencies:
      setup:
        - "**/*"

shell:
  setup:
    - cd /
    - mkdir -p /docs
    - /hack/generate_release_notes
    - rm -rf CHANGELOG hack
    - cat /docs/RELEASE_NOTES.md
    - cat /docs/RELEASE_NOTES.ru.md

# Bundle image, stored in your.registry.io/modules/<module-name>:<semver>
---
image: bundle
from: {{ index $.Images "builder/scratch" }}

import:
  # Rendering .werf/images-digests.yaml is required!
  - image: images-digests
    add: /images_digests.json
    to: /images_digests.json
    after: setup
  # Rendering go-hooks is required!
  - image: go-hooks-artifact
    add: /go-hooks
    to: /hooks/go-hooks
    after: setup
  # Rendering .werf/choose-edition.yaml is required!
  - image: choose-edition
    add: /openapi
    to: /openapi
    after: setup
  - image: docs-generator
    add: /docs/RELEASE_NOTES.md
    to: /docs/RELEASE_NOTES.md
    after: setup
  - image: docs-generator
    add: /docs/RELEASE_NOTES.ru.md
    to: /docs/RELEASE_NOTES.ru.md
    after: setup
git:
  - add: /
    to: /
    excludePaths:
      - hooks/go
    includePaths:
      - .helmignore
      - charts
      - crds
      - docs
      - hooks
      - monitoring
      - templates
      - Chart.yaml
      - module.yaml
