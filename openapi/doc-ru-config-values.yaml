type: object
properties:
  registryScheme:
    description: |
      Устаревший параметр.

      Удалите его из ModuleConfig для Deckhouse версии выше 1.57.
  logLevel:
    description: |
      Уровень логирования компонентов модуля.
  drbdPortRange:
    description: |
      Диапазон TCP-портов, которые DRBD использует для репликации между узлами.
    properties:
      minPort:
        description: |
          Нижняя граница диапазона TCP-портов DRBD.
      maxPort:
        description: |
          Верхняя граница диапазона TCP-портов DRBD.
  dataNodes:
    description: |
      Настройки размещения узлов LINSTOR с данными.
    properties:
      nodeSelector:
        description: |
          Селектор узлов для LINSTOR-узлов с данными. Семантика совпадает с `spec.nodeSelector` у Pod в Kubernetes.

          Если параметр не указан, узлы LINSTOR размещаются на всех узлах.

          **Внимание!** При изменении этого параметра существующие данные не переразмещаются. Если узел с данными перестанет соответствовать `nodeSelector`, данные на нём станут недоступны.
  storageClassLabelIgnoredPrefixes:
    description: |
      Префиксы ключей лейблов, которые не должны пробрасываться с `ReplicatedStorageClass` на управляемый `StorageClass` в Kubernetes.

      Контроллер объединяет этот список с системным списком и при формировании лейблов `StorageClass` отбрасывает любой лейбл `ReplicatedStorageClass`, ключ которого начинается с одного из префиксов объединённого списка.

      Сопоставление выполняется по `strings.HasPrefix` (буквальное префиксное сравнение, без учёта структуры лейбла Kubernetes). Запись без завершающего `/` совпадает по подстроке, а не по полному ключу: например, `team` отбросит и `team`, и `team-id`, и `team.example.com/...`. Чтобы ограничить совпадение конкретным поддоменом, заканчивайте запись на `/` (например, `argocd.argoproj.io/`). Чтобы ориентироваться на точный ключ, пишите ключ целиком, помня, что он также покроет ключи, имя которых его расширяет (например, `app.kubernetes.io/managed-by` отбросит и `app.kubernetes.io/managed-by-foo`).

      Системный префикс `kubernetes.io/` покрывает только ключи, начинающиеся буквально на `kubernetes.io/`. Зарезервированные поддомены Kubernetes — например, `topology.kubernetes.io/zone` или `node.kubernetes.io/*` — по умолчанию не покрываются. При необходимости добавляйте их в этот список явно.

      Встроенные значения по умолчанию покрывают лейблы, которые обычно проставляют инструменты GitOps (Argo CD, Flux, Rancher Fleet), чтобы их реконсилеры не конфликтовали с контроллером `sds-replicated-volume` за состояние лейблов на управляемом `StorageClass`.
  backup:
    description: |
      Настройки резервного копирования базы данных модуля.
    properties:
      enabled:
        description: |
          Включает или выключает резервное копирование базы данных модуля.
      retentionCount:
        description: |
          Количество хранимых резервных копий.
      schedule:
        description: |
          Cron-расписание создания резервных копий.
  newControlPlane:
    description: |
      Переключает модуль на новый control-plane как бэкенд.

      После установки значения `true` возврат к `false` запрещён.
