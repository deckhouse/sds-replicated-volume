x-extend:
  schema: config-values.yaml
type: object
properties:
  internal:
    type: object
    default: {}
    x-required-for-helm:
    - httpsClientCert
    - httpsControllerCert
    - sslControllerCert
    - sslNodeCert
    - drbdVersion
    - dataNodesChecksum
    - controlPlaneMigration
    - newControlPlane
    properties:
      drbdVersion:
        type: string
        default: "9.2.19-flant.13"
      dataNodesChecksum:
        type: string
        default: "default_data_nodes_checksum"
      controlPlaneMigration:
        type: string
        default: "not_started"
      newControlPlane:
        type: boolean
        default: false
        description: |
          Internal value determining whether to use the new control plane.
      masterPassphrase:
        type: string
      csiMigrationHook:
        type: object
        default: {}
        properties:
          completed:
            type: boolean
            default: false
          affectedPVsHash:
            type: string
            default: ""
            description: |
              Hash of affected PVs. Used to determine if bashible migration step should be forced to run.
      httpsClientCert:
        type: object
        default: {}
        x-required-for-helm:
        - crt
        - key
        - ca
        properties:
          crt:
            type: string
            x-examples: ["YjY0ZW5jX3N0cmluZwo="]
          key:
            type: string
            x-examples: ["YjY0ZW5jX3N0cmluZwo="]
          ca:
            type: string
            x-examples: ["YjY0ZW5jX3N0cmluZwo="]
      httpsControllerCert:
        type: object
        default: {}
        x-required-for-helm:
