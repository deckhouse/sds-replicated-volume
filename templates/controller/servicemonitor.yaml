{{- if .Values.sdsReplicatedVolume.newControlPlane }}
{{- if (.Values.global.enabledModules | has "operator-prometheus-crd") }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sds-replicated-volume-controller
  namespace: d8-monitoring
  {{- include "helm_lib_module_labels" (list $ (dict "prometheus" "main")) | nindent 2 }}
spec:
  endpoints:
  - port: metrics
    scheme: http
    path: /metrics
    relabelings:
    - regex: endpoint|namespace|pod|container
      action: labeldrop
    - targetLabel: job
      replacement: sds-replicated-volume-controller
    - targetLabel: tier
      replacement: cluster
    - sourceLabels: [__meta_kubernetes_endpointslice_endpoint_conditions_ready]
      regex: "true"
      action: keep
  selector:
    matchLabels:
      app: controller
  namespaceSelector:
    matchNames:
    - d8-{{ .Chart.Name }}
{{- end }}
{{- end }}
