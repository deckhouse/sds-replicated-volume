apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:manage:sds-replicated-volume:viewer
  labels:
    heritage: deckhouse
    module: sds-replicated-volume
    rbac.deckhouse.io/use-role: viewer
    rbac.deckhouse.io/kind: manage
    rbac.deckhouse.io/level: subsystem
    rbac.deckhouse.io/subsystem: sds-replicated-volume
    rbac.deckhouse.io/aggregate-to-sds-replicated-volume-as: manager
    rbac.deckhouse.io/aggregate-to-all-as: viewer
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.deckhouse.io/kind: manage
        rbac.deckhouse.io/aggregate-to-sds-replicated-volume-as: viewer
rules: []
