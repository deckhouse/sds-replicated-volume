{{- if .Values.sdsReplicatedVolume.internal.newControlPlane }}
{{- if not (contains "all_completed" (default "" .Values.sdsReplicatedVolume.internal.controlPlaneMigration)) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane-migrator
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-migrator
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
    resourceNames: ["linstor-controller"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-migrator
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane-migrator
subjects:
  - kind: ServiceAccount
    name: control-plane-migrator
    namespace: d8-{{ .Chart.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:{{ .Chart.Name }}:control-plane-migrator
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["delete"]
    resourceNames:
      - ebsremotes.internal.linstor.linbit.com
      - files.internal.linstor.linbit.com
      - keyvaluestore.internal.linstor.linbit.com
      - layerbcachevolumes.internal.linstor.linbit.com
      - layercachevolumes.internal.linstor.linbit.com
      - layerdrbdresourcedefinitions.internal.linstor.linbit.com
      - layerdrbdresources.internal.linstor.linbit.com
      - layerdrbdvolumedefinitions.internal.linstor.linbit.com
      - layerdrbdvolumes.internal.linstor.linbit.com
      - layerluksvolumes.internal.linstor.linbit.com
      - layeropenflexresourcedefinitions.internal.linstor.linbit.com
      - layeropenflexvolumes.internal.linstor.linbit.com
      - layerresourceids.internal.linstor.linbit.com
      - layerstoragevolumes.internal.linstor.linbit.com
      - layerwritecachevolumes.internal.linstor.linbit.com
      - linstorremotes.internal.linstor.linbit.com
      - linstorversion.internal.linstor.linbit.com
      - nodeconnections.internal.linstor.linbit.com
      - nodenetinterfaces.internal.linstor.linbit.com
      - nodes.internal.linstor.linbit.com
      - nodestorpool.internal.linstor.linbit.com
      - propscontainers.internal.linstor.linbit.com
      - resourceconnections.internal.linstor.linbit.com
      - resourcedefinitions.internal.linstor.linbit.com
      - resourcegroups.internal.linstor.linbit.com
      - resources.internal.linstor.linbit.com
      - rollback.internal.linstor.linbit.com
      - s3remotes.internal.linstor.linbit.com
      - satellitescapacity.internal.linstor.linbit.com
      - schedules.internal.linstor.linbit.com
      - secaccesstypes.internal.linstor.linbit.com
      - secaclmap.internal.linstor.linbit.com
      - secconfiguration.internal.linstor.linbit.com
      - secdfltroles.internal.linstor.linbit.com
      - secidentities.internal.linstor.linbit.com
      - secidrolemap.internal.linstor.linbit.com
      - secobjectprotection.internal.linstor.linbit.com
      - secroles.internal.linstor.linbit.com
      - sectyperules.internal.linstor.linbit.com
      - sectypes.internal.linstor.linbit.com
      - spacehistory.internal.linstor.linbit.com
      - storpooldefinitions.internal.linstor.linbit.com
      - trackingdate.internal.linstor.linbit.com
      - volumeconnections.internal.linstor.linbit.com
      - volumedefinitions.internal.linstor.linbit.com
      - volumegroups.internal.linstor.linbit.com
      - volumes.internal.linstor.linbit.com
  - apiGroups: ["deckhouse.io"]
    resources: ["moduleconfigs"]
    verbs: ["get"]
    resourceNames:
      - sds-replicated-volume
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["list"]
  - apiGroups: ["internal.linstor.linbit.com"]
    resources:
      - ebsremotes
      - files
      - keyvaluestore
      - layerbcachevolumes
      - layercachevolumes
      - layerdrbdresourcedefinitions
      - layerdrbdresources
      - layerdrbdvolumedefinitions
      - layerdrbdvolumes
      - layerluksvolumes
      - layeropenflexresourcedefinitions
      - layeropenflexvolumes
      - layerresourceids
      - layerstoragevolumes
      - layerwritecachevolumes
      - linstorremotes
      - linstorversion
      - nodeconnections
      - nodenetinterfaces
      - nodes
      - nodestorpool
      - propscontainers
      - resourceconnections
      - resourcedefinitions
      - resourcegroups
      - resources
      - rollback
      - s3remotes
      - satellitescapacity
      - schedules
      - secaccesstypes
      - secaclmap
      - secconfiguration
      - secdfltroles
      - secidentities
      - secidrolemap
      - secobjectprotection
      - secroles
      - sectyperules
      - sectypes
      - spacehistory
      - storpooldefinitions
      - trackingdate
      - volumeconnections
      - volumedefinitions
      - volumegroups
      - volumes
    verbs: ["list"]
  - apiGroups: ["storage.deckhouse.io"]
    resources:
      - replicatedstorageclasses
      - lvmvolumegroups
    verbs: ["list"]
  - apiGroups: ["storage.deckhouse.io"]
    resources:
      - replicatedvolumes
      - replicatedvolumereplicas
      - replicatedstoragepools
      - drbdresources
      - replicatedvolumeattachments
      - lvmlogicalvolumes
    verbs: ["create", "get", "list", "patch", "delete"]
  - apiGroups: ["storage.deckhouse.io"]
    resources: ["replicatedstoragemetadatabackups"]
    verbs: ["deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:{{ .Chart.Name }}:control-plane-migrator
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: control-plane-migrator
    namespace: d8-{{ .Chart.Name }}
roleRef:
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:control-plane-migrator
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
