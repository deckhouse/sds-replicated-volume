{{- if .Values.sdsReplicatedVolume.internal.newControlPlane }}
{{- if not (contains "all_completed" (default "" .Values.sdsReplicatedVolume.internal.controlPlaneMigration)) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: control-plane-migrator
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: control-plane-migrator
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
    resourceNames: ["linstor-controller"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: control-plane-migrator
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: control-plane-migrator
subjects:
  - kind: ServiceAccount
    name: control-plane-migrator
    namespace: d8-{{ .Chart.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: d8:{{ .Chart.Name }}:control-plane-migrator
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
    resourceNames:
      - nodes.internal.linstor.linbit.com
      - replicatedvolumes.storage.deckhouse.io
  - apiGroups: ["deckhouse.io"]
    resources: ["moduleconfigs"]
    verbs: ["get"]
    resourceNames:
      - sds-replicated-volume
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["list"]
  - apiGroups: ["internal.linstor.linbit.com"]
    resources:
      - volumedefinitions
      - resourcedefinitions
      - resourcegroups
      - resources
      - layerresourceids
      - layerdrbdresources
      - layerdrbdresourcedefinitions
      - propscontainers
      - nodestorpool
      - nodestorpools
    verbs: ["list"]
  - apiGroups: ["storage.deckhouse.io"]
    resources:
      - replicatedstorageclasses
    verbs: ["list"]
  - apiGroups: ["storage.deckhouse.io"]
    resources:
      - replicatedvolumes
      - replicatedvolumereplicas
      - replicatedstoragepools
      - drbdresources
      - replicatedvolumeattachments
      - lvmlogicalvolumes
    verbs: ["create", "get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: d8:{{ .Chart.Name }}:control-plane-migrator
  {{- include "helm_lib_module_labels" (list . (dict "app" "control-plane-migrator")) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: control-plane-migrator
    namespace: d8-{{ .Chart.Name }}
roleRef:
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:control-plane-migrator
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
