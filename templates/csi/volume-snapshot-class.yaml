{{- if not .Values.sdsReplicatedVolume.internal.newControlPlane }}
{{- if (.Values.global.enabledModules | has "snapshot-controller") }}
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" "linstor-csi-controller")) | nindent 2 }}
  name: {{ .Chart.Name }}
driver: replicated.csi.storage.deckhouse.io
deletionPolicy: Delete
{{- end }}
{{- end }}


{{- if and .Values.sdsReplicatedVolume.internal.newControlPlane (not (has (default "" .Values.sdsReplicatedVolume.internal.controlPlaneMigration) (list "not_started" "stage1_started" "stage1_completed"))) }}
{{- if (.Values.global.enabledModules | has "snapshot-controller") }}
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  {{- include "helm_lib_module_labels" (list . (dict "app" "csi-controller")) | nindent 2 }}
  name: {{ .Chart.Name }}
driver: replicated.csi.storage.deckhouse.io
deletionPolicy: Delete
{{- end }}
{{- end }}
