giterminismConfigVersion: 1
config:
  goTemplateRendering: # The rules for the Go-template functions to be able to pass build context to the release
    allowEnvVariables:
      - /CI_.+/
      - MODULES_MODULE_TAG
      - MODULE_EDITION
      - WERF_DISABLE_META_TAGS
      - GOLANG_VERSION
      - GOPROXY
      - SOURCE_REPO
      - DISTRO_PACKAGES_PROXY
      - SOURCE_REPO_TAG
      - REGISTRY_USER
      - REGISTRY_PASSWORD
      - /COSIGN_.+/
      - /ACTIONS_ID_.+/
    allowUncommittedFiles:
      - "base_images.yml"
  secrets:
    allowEnvVariables:
      - REGISTRY_USER
      - REGISTRY_PASSWORD
      - /COSIGN_.+/
      - /ACTIONS_ID_TOKEN_REQUEST_.+/
    allowValueIds:
      - GOPROXY
      - SOURCE_REPO
      - DISTRO_PACKAGES_PROXY
  stapel:
    mount:
      allowBuildDir: true
      allowFromPaths:
        - ~/go-pkg-cache
