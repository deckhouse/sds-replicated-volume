giterminismConfigVersion: 1
config:
  goTemplateRendering: # The rules for the Go-template functions to be able to pass build context to the release
    allowEnvVariables:
      - /CI_.+/
      - MODULES_MODULE_TAG
      - MODULE_EDITION
      - WERF_DISABLE_META_TAGS
      - GOLANG_VERSION
      - GOPROXY
      - SOURCE_REPO
      - DISTRO_PACKAGES_PROXY
      - SOURCE_REPO_TAG
      - ACTIONS_ID_TOKEN_REQUEST_TOKEN
      - VAULT_KEY
      - WERF_SIGN_KEY
    allowUncommittedFiles:
      - "base_images.yml"
  secrets:
    allowEnvVariables:
      - REGISTRY_USER
      - REGISTRY_PASSWORD
      - VAULT_ADDR
      - WERF_SIGN_KEY
      - WERF_VAULT_AUTH_ROLE
      - WERF_VAULT_AUTH_JWT
      - TRANSIT_SECRET_ENGINE_PATH
      - ACTIONS_ID_TOKEN_REQUEST_TOKEN
      - ACTIONS_ID_TOKEN_REQUEST_URL
    allowValueIds:
      - GOPROXY
      - SOURCE_REPO
      - DISTRO_PACKAGES_PROXY
  stapel:
    mount:
      allowBuildDir: true
      allowFromPaths:
        - ~/go-pkg-cache
