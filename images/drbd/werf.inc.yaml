---
image: {{ $.ImageName }}-artifact
from: {{ index $.Images "builder/golang-alt" }}
final: false
git:
  - add: /images/{{ $.ImageName }}/scripts
    to: /scripts
    stageDependencies:
      beforeSetup:
        - "**/*"
shell:
  beforeInstall:
    - export DEBIAN_FRONTEND=noninteractive
    - |
      apt-get update \
      && apt-get -y install {{ $.Root.BUILD_PACKAGES }} \
      && apt-get -y install ca-certificates \
      && update-ca-trust
    - {{ $.Root.ALT_CLEANUP_CMD }}
    - git config --global user.email "builder@deckhouse.io"
    - git config --global user.name "deckhouse"
  install:
    {{- $ctx := dict }}
    {{- include "utils:prepare-rpm-build" $ctx | nindent 2 }}
  beforeSetup:
    - mv /scripts/* /
    - chmod +x /install
    - chmod +x /uninstall
  setup:
    # cache-bust: tag drbd-9.2.19-flant.11 was force-moved to the RACEDBG commit
    # 3f20955ab; this echo changes the setup-stage digest so werf re-clones it.
    - echo "drbd-ref 3f20955ab RACEDBG flant.11 (re-clone moved tag)"
    - git clone --depth 1 --branch drbd-{{ include "get_oss_version_by_id" (list "DRBD" $.Root) }} {{ $.Root.SOURCE_REPO }}/deckhouse/3p-drbd.git  /drbd
    - cd /drbd
    - git submodule update --init --recursive
    - sed -e "s/\<curl\>/d8-curl -k/g" -i /drbd/drbd/drbd-kernel-compat/gen_compat_patch.sh
    - git commit -am 'd8-curl'
      # tarball required by spaas image
    - make tarball
      # disable use of local spatch (see /drbd/drbd/drbd-kernel-compat/gen_compat_patch.sh)
    - rm -rf .git
---
image: {{ $.ImageName }}
from: {{ index $.Images "builder/distroless" }}

import:
  - image: {{ $.ImageName }}-artifact
    add: /
    to: /
    includePaths:
      - drbd
      - install
      - uninstall
    before: setup
docker:
  LABEL:
    distro: all
    version: all
    drbd: {{ include "get_oss_version_by_id" (list "DRBD" $.Root) }}
