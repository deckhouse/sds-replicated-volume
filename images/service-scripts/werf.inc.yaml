---
image: {{ $.ImageName }}-artifact
from: {{ index $.Images "builder/alpine" }}
final: false

git:
  - add: /images/{{ $.ImageName }}
    to: /
    excludePaths:
    - werf.inc.yaml
    stageDependencies:
      setup:
        - scripts
        - tools

shell:
  setup:
    - chmod a+x scripts/*
    - mv scripts/* /
    - chmod a+x tools/*
    - mv tools/* /

---
image: {{ $.ImageName }}
from: {{ index $.Images "builder/distroless" }}

import:
  - image: {{ $.ImageName }}-artifact
    add: /
    to: /
    includePaths:
      - evict.sh
      - replicas_manager.sh
      - install
      - uninstall
    before: setup
docker:
  LABEL:
    distro: all
    version: all
