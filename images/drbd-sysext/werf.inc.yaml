# drbd-sysext — DRBD kernel module compiled against the Olcedar kernel and packaged
# as a systemd-sysext (erofs + dm-verity) for Deckhouse Olcedar nodes. Driven by a
# NodeExtensionRequest (node-manager resolves it into NodeConfig.spec.extensions[]);
# nodelet merges the sysext via systemd-sysext.
#
# Toolchain follows sds-replicated-volume-kernel-module/images/drbd-builder: alt:sisyphus
# has the full repo — gcc14 (kernel 6.12+ needs -fmin-function-alignment=16), coccinelle
# (DRBD kernel-compat spatch), patch, plus erofs-utils/cryptsetup for packaging. The
# kernel build tree comes from the stable Olcedar kernel-devel image (Module.symvers
# present; CONFIG_MODVERSIONS=y). The kernel-devel tag is re-pinned on kernel rebuild.
---
image: kernel-devel-src
from: dev-registry.deckhouse.io/container-factory/kernel:b5e1f632dccc37c8a562d2b14f4d756447cf29945db736d78adfd35b-1784912011538
final: false
---
image: {{ $.ImageName }}-artifact
from: alt:sisyphus
final: false
import:
  - image: kernel-devel-src
    add: /usr/src
    to: /usr/src
    before: install
  - image: drbd-artifact
    add: /drbd
    to: /drbd
    before: install
git:
  - add: /images/{{ $.ImageName }}/sysext
    to: /sysext-files
    stageDependencies:
      install:
        - "**/*"
shell:
  beforeInstall:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update
    - apt-get install -y gcc14 make binutils bc kmod coccinelle patch elfutils-devel bison flex m4 perl erofs-utils cryptsetup coreutils ca-certificates
    - apt-get clean && rm -rf /var/lib/apt/lists/*
    # ALT ships the compiler as x86_64-alt-linux-gcc-14. DRBD's Makefile.spatch host
    # step (GENPATCHNAMES) invokes the unversioned x86_64-alt-linux-gcc; the kernel
    # module compile uses CC=gcc-14. Provide every default name pointing at gcc-14.
    - for n in gcc-14 gcc cc x86_64-alt-linux-gcc; do ln -sf x86_64-alt-linux-gcc-14 /usr/bin/$n; done
  install:
    - export KDIR="$(ls -d /usr/src/linux-headers-* | head -1)"
    - export KREL="$(basename ${KDIR} | sed 's/^linux-headers-//')"
    - make -C /drbd module KDIR="${KDIR}" KVER="${KREL}" CC=gcc-14
    # Assemble the sysext filesystem tree.
    - mkdir -p /sysext/usr/lib/modules/${KREL}/updates
    - mkdir -p /sysext/usr/lib/extension-release.d
    - mkdir -p /sysext/usr/lib/systemd/system
    - cp /drbd/drbd/build-current/drbd.ko /drbd/drbd/build-current/drbd_transport_tcp.ko /sysext/usr/lib/modules/${KREL}/updates/
    - cp /sysext-files/extension-release.drbd /sysext/usr/lib/extension-release.d/extension-release.drbd
    - cp /sysext-files/sysext-drbd.service    /sysext/usr/lib/systemd/system/sysext-drbd.service
    - mkfs.erofs -L _sysext -U 00000000-0000-0000-0000-000000000000 -z lzma,9 /drbd.erofs /sysext/
    - veritysetup format /drbd.erofs /drbd.verity > /verity.txt
    - mkdir -p /out && cat /drbd.erofs /drbd.verity > /out/drbd.raw
---
image: {{ $.ImageName }}
from: {{ index $.Images "builder/distroless" }}
import:
  - image: {{ $.ImageName }}-artifact
    add: /out/drbd.raw
    to: /drbd.raw
    before: setup
docker:
  LABEL:
    distro: all
    drbd: {{ include "get_oss_version_by_id" (list "DRBD" $.Root) }}
