# drbd-sysext — DRBD kernel module compiled against the Olcedar kernel and packaged
# as a systemd-sysext (erofs + dm-verity) for Deckhouse Olcedar nodes.
#
# Olcedar nodes have a read-only root and no on-node compiler, so DRBD is compiled
# at CI time and shipped as a sysext that nodelet merges via systemd-sysext, driven
# by a NodeExtensionRequest (node-manager resolves it into NodeConfig.spec.extensions[]).
#
# Kernel: we build on top of the Olcedar kernel SOURCE artifact (kernel-src-artifact),
# install the kernel build toolchain, build the kernel to produce Module.symvers
# (the Olcedar kernel has CONFIG_MODVERSIONS=y, so a valid Module.symvers is required
# for the module to load), then compile DRBD out-of-tree against it. No change to the
# kernel repo. NOTE: the kernel-src-artifact tag below is a pinned werf stage tag from
# container-factory/kernel and is re-pinned when the Olcedar kernel is rebuilt.
---
image: {{ $.ImageName }}-artifact
from: dev-registry.deckhouse.io/container-factory/kernel:8e84142f58863a82add02add37e056bea692d2fa4ed27aec0ee1d41c-1783630518054
final: false
import:
  # DRBD source (3p-drbd, compat tooling) built by images/drbd.
  - image: drbd-artifact
    add: /drbd
    to: /drbd
    before: install
git:
  - add: /images/{{ $.ImageName }}/sysext
    to: /sysext-files
    stageDependencies:
      install:
        - "**/*"
shell:
  beforeInstall:
    # Kernel build toolchain (same set the kernel repo uses) + sysext packaging tools.
    - pm install gnu-glibc-devel binutils bc cpio kmod linux-headers make openssl-devel elfutils-devel diffutils findutils zstd pahole bison flex gnu-gcc-devel m4 python perl erofs-utils cryptsetup coreutils
  install:
    # Build the Olcedar kernel to produce the prepared tree + Module.symvers.
    - export CARCH="amd64"
    - cd /src
    - cp /src/config-${CARCH}.txt /src/.config
    - make olddefconfig
    - make KCFLAGS="-Wno-unused-but-set-variable" -j"$(nproc)"
    - export KREL="$(cat /src/include/config/kernel.release)"
    # Compat-patch DRBD for this kernel and build the module out-of-tree.
    - cd /drbd/drbd
    - make -C /src M="$(pwd)" modules KERNELRELEASE="${KREL}"
    # Assemble the sysext filesystem tree.
    - mkdir -p /sysext/usr/lib/modules/${KREL}/updates
    - mkdir -p /sysext/usr/lib/extension-release.d
    - mkdir -p /sysext/usr/lib/systemd/system
    - cp drbd.ko drbd_transport_tcp.ko /sysext/usr/lib/modules/${KREL}/updates/
    - cp /sysext-files/extension-release.drbd /sysext/usr/lib/extension-release.d/extension-release.drbd
    - cp /sysext-files/sysext-drbd.service    /sysext/usr/lib/systemd/system/sysext-drbd.service
    # erofs + dm-verity (same recipe as core sysexts).
    - mkfs.erofs -L _sysext -U 00000000-0000-0000-0000-000000000000 -z lzma,9 /drbd.erofs /sysext/
    - veritysetup format /drbd.erofs /drbd.verity > /verity.txt
    - mkdir -p /out && cat /drbd.erofs /drbd.verity > /out/drbd.raw
---
image: {{ $.ImageName }}
from: {{ index $.Images "builder/distroless" }}
import:
  - image: {{ $.ImageName }}-artifact
    add: /out/drbd.raw
    to: /drbd.raw
    before: setup
docker:
  LABEL:
    distro: all
    drbd: {{ include "get_oss_version_by_id" (list "DRBD" $.Root) }}
