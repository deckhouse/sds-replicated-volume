# drbd-sysext — DRBD kernel module compiled against the Olcedar kernel and packaged
# as a systemd-sysext (erofs + dm-verity) for Deckhouse Olcedar nodes.
#
# Olcedar nodes have a read-only root and no on-node compiler, so DRBD is compiled at
# CI time and shipped as a sysext that nodelet merges via systemd-sysext, driven by a
# NodeExtensionRequest (node-manager resolves it into NodeConfig.spec.extensions[]).
#
# Kernel: compiled against the Olcedar kernel-devel image (a stable FINAL image with
# the prepared build tree + Module.symvers; CONFIG_MODVERSIONS=y requires it). We use
# the same compiler family the kernel was built with (gnu-gcc-devel via pm) — the
# kernel is built with GCC >= 14 (uses -fmin-function-alignment), so an older gcc
# cannot build modules for it. The kernel-devel tag is pinned and re-pinned on rebuild.
---
# Carrier of the Olcedar kernel build tree (from the external kernel-devel image).
image: kernel-devel-src
from: dev-registry.deckhouse.io/container-factory/kernel:b5e1f632dccc37c8a562d2b14f4d756447cf29945db736d78adfd35b-1784912011538
final: false
---
image: {{ $.ImageName }}-artifact
from: {{ index $.Images "builder/golang" }}
final: false
import:
  - image: kernel-devel-src
    add: /usr/src
    to: /usr/src
    before: install
  # DRBD source (3p-drbd, compat tooling) built by images/drbd.
  - image: drbd-artifact
    add: /drbd
    to: /drbd
    before: install
  # `patch` is not in the pm repo; borrow it from drbd-artifact (built with apt).
  - image: drbd-artifact
    add: /usr/bin/patch
    to: /usr/bin/patch
    before: install
git:
  - add: /images/{{ $.ImageName }}/sysext
    to: /sysext-files
    stageDependencies:
      install:
        - "**/*"
shell:
  beforeInstall:
    # Matching kernel compiler + module + compat + sysext packaging tools.
    - pm install gnu-gcc-devel make binutils bc kmod elfutils-devel bison flex m4 perl erofs-utils cryptsetup coreutils
  install:
    - export KDIR="$(ls -d /usr/src/linux-headers-* | head -1)"
    - export KREL="$(basename ${KDIR} | sed 's/^linux-headers-//')"
    - make -C /drbd module KDIR="${KDIR}" KVER="${KREL}"
    # Assemble the sysext filesystem tree.
    - mkdir -p /sysext/usr/lib/modules/${KREL}/updates
    - mkdir -p /sysext/usr/lib/extension-release.d
    - mkdir -p /sysext/usr/lib/systemd/system
    - cp /drbd/drbd/build-current/drbd.ko /drbd/drbd/build-current/drbd_transport_tcp.ko /sysext/usr/lib/modules/${KREL}/updates/
    - cp /sysext-files/extension-release.drbd /sysext/usr/lib/extension-release.d/extension-release.drbd
    - cp /sysext-files/sysext-drbd.service    /sysext/usr/lib/systemd/system/sysext-drbd.service
    - mkfs.erofs -L _sysext -U 00000000-0000-0000-0000-000000000000 -z lzma,9 /drbd.erofs /sysext/
    - veritysetup format /drbd.erofs /drbd.verity > /verity.txt
    - mkdir -p /out && cat /drbd.erofs /drbd.verity > /out/drbd.raw
---
image: {{ $.ImageName }}
from: {{ index $.Images "builder/distroless" }}
import:
  - image: {{ $.ImageName }}-artifact
    add: /out/drbd.raw
    to: /drbd.raw
    before: setup
docker:
  LABEL:
    distro: all
    drbd: {{ include "get_oss_version_by_id" (list "DRBD" $.Root) }}
