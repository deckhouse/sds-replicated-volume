# drbd-sysext — a systemd-sysext (erofs + dm-verity) for Deckhouse Olcedar nodes.
#
# SCOPE: this is a delivery-mechanism test. It packages a MINIMAL sysext (a marker
# file + a oneshot unit that fires on merge) — NOT the compiled DRBD kernel module.
# The goal is to exercise the end-to-end delivery path: a NodeExtensionRequest is
# aggregated by node-controller into the node's NodeConfig.spec.extensions[], and
# nodelet fetches this sysext, merges it with systemd-sysext, and reports status.
#
# The real drbd.ko payload (compiled against the exact Olcedar kernel) is a separate
# task and does NOT touch the kernel repo — see the PR description.
---
image: {{ $.ImageName }}-artifact
from: {{ index $.Images "builder/golang-alt" }}
final: false
git:
  - add: /images/{{ $.ImageName }}/sysext
    to: /sysext-files
    stageDependencies:
      install:
        - "**/*"
shell:
  beforeInstall:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update && apt-get -y install erofs-utils cryptsetup coreutils
    - {{ $.Root.ALT_CLEANUP_CMD }}
  install:
    - mkdir -p /sysext/usr/lib/extension-release.d
    - mkdir -p /sysext/usr/lib/systemd/system
    - mkdir -p /sysext/usr/share/drbd-sysext
    - cp /sysext-files/extension-release.drbd /sysext/usr/lib/extension-release.d/extension-release.drbd
    - cp /sysext-files/sysext-drbd.service    /sysext/usr/lib/systemd/system/sysext-drbd.service
    - echo "drbd sysext delivery marker" > /sysext/usr/share/drbd-sysext/marker
    # Build the erofs image + dm-verity, same recipe as the core sysexts
    # (007-registrypackages/images/*/sysext in deckhouse).
    - mkfs.erofs -L _sysext -U 00000000-0000-0000-0000-000000000000 -z lzma,9 /drbd.erofs /sysext/
    - veritysetup format /drbd.erofs /drbd.verity > /verity.txt
    - mkdir -p /out && cat /drbd.erofs /drbd.verity > /out/drbd.raw
---
image: {{ $.ImageName }}
from: {{ index $.Images "builder/distroless" }}
import:
  - image: {{ $.ImageName }}-artifact
    add: /out/drbd.raw
    to: /drbd.raw
    before: setup
docker:
  LABEL:
    distro: all
    drbd: {{ include "get_oss_version_by_id" (list "DRBD" $.Root) }}
