# drbd-sysext — DRBD kernel module compiled against the Olcedar kernel and packaged
# as a systemd-sysext (erofs + dm-verity) for Deckhouse Olcedar nodes.
#
# Olcedar nodes have a read-only root and no on-node compiler, so DRBD cannot be
# built on the node (images/drbd ships source + compiles on-node via spaas). Here
# the module is compiled at CI time and shipped as a sysext that nodelet merges via
# systemd-sysext, driven by a NodeExtensionRequest (node-manager resolves it into
# the node's NodeConfig.spec.extensions[]).
#
# Kernel: we compile against the Olcedar kernel BUILD artifact (kernel-artifact),
# which already carries the prepared /src tree + Module.symvers (needed because the
# Olcedar kernel has CONFIG_MODVERSIONS=y). No change to the kernel repo.
# NOTE: the kernel-artifact tag below is a pinned werf stage tag from
# container-factory/kernel and must be re-pinned when the Olcedar kernel is rebuilt
# (same model as olcedar pinning KERNEL_VERSION/INITRAMFS_VERSION).
---
image: {{ $.ImageName }}-artifact
from: dev-registry.deckhouse.io/container-factory/kernel:243699225d19b4fbd0e2939d71d81d9682337a2d035685d06050a9f8-1784904516298
final: false
import:
  # DRBD source (3p-drbd, compat tooling) built by images/drbd.
  - image: drbd-artifact
    add: /drbd
    to: /drbd
    before: install
git:
  - add: /images/{{ $.ImageName }}/sysext
    to: /sysext-files
    stageDependencies:
      install:
        - "**/*"
shell:
  beforeInstall:
    # The kernel-artifact base already carries the kernel build toolchain
    # (gnu-gcc-devel, make, binutils, linux-headers). Only add the sysext packaging
    # tools, the same way the core sysexts do it (007-registrypackages).
    - pm install erofs-utils coreutils cryptsetup
  install:
    - export KREL="$(cat /src/include/config/kernel.release)"
    # Compat-patch DRBD for this kernel and build the module out-of-tree against the
    # prepared kernel tree in /src (Module.symvers present -> valid symbol versions).
    - cd /drbd/drbd
    - make -C /src M="$(pwd)" modules KERNELRELEASE="${KREL}"
    # Assemble the sysext filesystem tree.
    - mkdir -p /sysext/usr/lib/modules/${KREL}/updates
    - mkdir -p /sysext/usr/lib/extension-release.d
    - mkdir -p /sysext/usr/lib/systemd/system
    - cp drbd.ko drbd_transport_tcp.ko /sysext/usr/lib/modules/${KREL}/updates/
    - cp /sysext-files/extension-release.drbd /sysext/usr/lib/extension-release.d/extension-release.drbd
    - cp /sysext-files/sysext-drbd.service    /sysext/usr/lib/systemd/system/sysext-drbd.service
    # erofs + dm-verity (same recipe as core sysexts).
    - mkfs.erofs -L _sysext -U 00000000-0000-0000-0000-000000000000 -z lzma,9 /drbd.erofs /sysext/
    - veritysetup format /drbd.erofs /drbd.verity > /verity.txt
    - mkdir -p /out && cat /drbd.erofs /drbd.verity > /out/drbd.raw
---
image: {{ $.ImageName }}
from: {{ index $.Images "builder/distroless" }}
import:
  - image: {{ $.ImageName }}-artifact
    add: /out/drbd.raw
    to: /drbd.raw
    before: setup
docker:
  LABEL:
    distro: all
    drbd: {{ include "get_oss_version_by_id" (list "DRBD" $.Root) }}
