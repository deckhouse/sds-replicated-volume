spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Описывает соответствие между нижележащим блочным устройством на узле и верхним (создаваемым) блочным устройством. Используется агентом для управления device-mapper-устройством поверх нижележащего устройства на конкретном узле.
          properties:
            apiVersion:
              description: |-
                APIVersion определяет версионную схему этого представления объекта. Серверы должны преобразовывать распознанные схемы в последнее внутреннее значение и могут отклонять нераспознанные значения. Более подробно: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources.
            kind:
              description: |-
                Kind — это строковое значение, представляющее REST-ресурс, который описывает этот объект.
                Серверы могут определять его на основе конечной точки, к которой клиент отправляет запросы.
                Не может быть изменено. Записывается в CamelCase.
                Подробнее: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            spec:
              properties:
                lowerDevicePath:
                  description: |
                    Путь к нижележащему блочному устройству на узле.

                    > Важно: это поле является неизменяемым и не может быть изменено после первоначального создания ресурса.
                nodeName:
                  description: |
                    Имя узла, на котором расположено устройство.

                    > Важно: это поле является неизменяемым и не может быть изменено после первоначального создания ресурса.
            status:
              properties:
                conditions:
                  description: |
                    Условия, отражающие текущее состояние ресурса.
                openCount:
                  description: |
                    Количество текущих открытий (использований) верхнего блочного устройства.
                upperDevicePath:
                  description: |
                    Путь к верхнему (созданному) блочному устройству на узле.
