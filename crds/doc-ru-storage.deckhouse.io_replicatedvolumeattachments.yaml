spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            ReplicatedVolumeAttachment описывает намерение и состояние подключения (attachment) ReplicatedVolume к конкретному узлу кластера.
          properties:
            spec:
              properties:
                nodeName:
                  description: |
                    Имя узла, к которому должен быть подключён том.

                    > Важно: это поле является неизменяемым и не может быть изменено после первоначального создания ресурса.
                replicatedVolumeName:
                  description: |
                    Имя ReplicatedVolume, который должен быть подключён к узлу.

                    > Важно: это поле является неизменяемым и не может быть изменено после первоначального создания ресурса.
            status:
              properties:
                conditions:
                  description: |
                    Условия, отражающие текущее состояние подключения тома.
                devicePath:
                  description: |
                    Путь к блочному устройству на узле. Задаётся только когда устройство доступно на узле. Пример: /dev/drbd10012.
                inUse:
                  description: |
                    Признак того, что блочное устройство в данный момент используется каким-либо процессом. Задаётся только когда устройство доступно на узле.
                ioSuspended:
                  description: |
                    Признак того, что ввод-вывод на устройстве приостановлен (suspend-io). Задаётся только когда устройство доступно на узле.
                message:
                  description: |
                    Человекочитаемое описание текущего состояния подключения.
                phase:
                  description: |
                    Краткая сводка операционного состояния подключения. Может быть:
                    - Pending (подключение ожидает обработки)
                    - Attaching (выполняется подключение)
                    - Attached (том подключён и устройство доступно на узле)
                    - Detaching (выполняется отключение)
                    - Terminating (ресурс подключения удаляется).
