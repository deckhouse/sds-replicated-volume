spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Интерфейс для управления операциями над DRBD-ресурсом на конкретном узле кластера. Ресурс создаётся для выполнения обслуживающей операции над DRBD-ресурсом; агент на указанном узле выполняет операцию и отражает результат в статусе.
          properties:
            apiVersion:
              description: |-
                APIVersion определяет версионную схему этого представления объекта. Серверы должны преобразовывать распознанные схемы в последнее внутреннее значение и могут отклонять нераспознанные значения. Более подробно: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources.
            kind:
              description: |-
                Kind — это строковое значение, представляющее REST-ресурс, который описывает этот объект.
                Серверы могут определять его на основе конечной точки, к которой клиент отправляет запросы.
                Не может быть изменено. Записывается в CamelCase.
                Подробнее: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            spec:
              properties:
                createNewUUID:
                  description: |
                    Параметры операции CreateNewUUID.

                    > Важно: это поле является неизменяемым после установки.
                  properties:
                    clearBitmap:
                      description: |
                        Очистить bitmap при создании нового UUID (том считается полностью синхронизированным).
                    forceResync:
                      description: |
                        Принудительно запустить ресинхронизацию после создания нового UUID.

                        > Обратите внимание, что поля 'clearBitmap' и 'forceResync' являются взаимоисключающими.
                drbdResourceName:
                  description: |
                    Имя DRBD-ресурса, над которым выполняется операция.

                    > Важно: это поле является неизменяемым и не может быть изменено после первоначального создания ресурса.
                nodeName:
                  description: |
                    Имя узла, ограничивающее выполнение операции одним агентом: операцию обработает только агент, запущенный на этом узле.

                    > Важно: это поле является неизменяемым и не может быть изменено после первоначального создания ресурса.
                type:
                  description: |
                    Тип операции над DRBD-ресурсом. Может быть:
                    - CreateNewUUID (создание нового UUID данных)
                    - ForcePrimary (принудительный перевод ресурса в роль Primary)
                    - Invalidate (пометка локальных данных как невалидных с последующей ресинхронизацией)
                    - Outdate (пометка данных как устаревших)
                    - Verify (запуск онлайн-проверки целостности данных)
                    - CreateSnapshot (создание снапшота).

                    > Важно: это поле является неизменяемым и не может быть изменено после первоначального создания ресурса.
            status:
              properties:
                phase:
                  description: |
                    Текущая фаза выполнения операции.
                message:
                  description: |
                    Дополнительное человекочитаемое сообщение о текущем состоянии операции.
                startedAt:
                  description: |
                    Время начала выполнения операции.
                completedAt:
                  description: |
                    Время завершения операции.
