spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Интерфейс для управления операциями над DRBD на уровне узла кластера. Ресурс создаётся для выполнения обслуживающей операции на конкретном узле; агент на этом узле выполняет операцию и отражает результат в статусе.
          properties:
            spec:
              properties:
                nodeName:
                  description: |
                    Имя узла, на котором будет выполнена операция.

                    > Важно: это поле является неизменяемым и не может быть изменено после первоначального создания ресурса.
                type:
                  description: |
                    Тип операции над DRBD на узле. Может быть:
                    - UpdateDRBD (обновление DRBD на узле).

                    > Важно: это поле является неизменяемым и не может быть изменено после первоначального создания ресурса.
            status:
              properties:
                phase:
                  description: |
                    Текущая фаза выполнения операции.
                message:
                  description: |
                    Дополнительное человекочитаемое сообщение о текущем состоянии операции.
                startedAt:
                  description: |
                    Время начала выполнения операции.
                completedAt:
                  description: |
                    Время завершения операции.
